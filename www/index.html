<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaidVerso v3.8</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap');
        body { margin: 0; background: #020205; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier Prime', monospace; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; background: #000; overflow: hidden; }
        .ui-overlay { position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); pointer-events: none; color: #00ffff; display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; z-index: 10; }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 25, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; color: #00ffff; text-align: center; }
        input { background: #1a1a2e; border: 2px solid #00ffff; color: #00ffff; padding: 15px; font-family: 'Courier Prime', monospace; font-size: 18px; margin: 10px; text-align: center; outline: none; width: 80%; }
        button { background: #00ffff; color: #000; border: none; padding: 12px 25px; font-family: 'Courier Prime', monospace; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 0 15px #00ffff; margin-top: 10px; }
        .quiz-option { background: #1a1a2e; border: 1px solid #00ffff; color: #00ffff; padding: 12px; margin: 8px; width: 90%; cursor: pointer; font-family: 'Courier Prime', monospace; }
        .quiz-option:hover { background: #00ffff; color: #000; }
        #leaderboard { margin-top: 15px; font-size: 11px; color: #ffff00; width: 85%; background: rgba(0,255,255,0.05); padding: 8px; border-radius: 5px; }
        .rank-item { display: flex; justify-content: space-between; margin: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #pause-btn { position: absolute; bottom: 20px; left: 20px; width: 50px; height: 50px; background: rgba(0,255,255,0.2); border: 2px solid #00ffff; color: #00ffff; border-radius: 50%; font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; pointer-events: auto; z-index: 200; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="game-container"></div>
    
    <div id="pause-btn" onclick="togglePause()">⏸</div>

    <!-- LOGIN -->
    <div id="login-screen" class="modal">
        <h1 style="color:#00ffff; text-shadow: 0 0 15px #00ffff; margin-bottom: 5px;">SAIDVERSO</h1>
        <div id="leaderboard">
            <div style="font-weight:bold; margin-bottom:5px; color:#00ffff;">🏆 MEJORES EXPLORADORES</div>
            <div id="rank-list">Cargando...</div>
        </div>
        <input type="text" id="username-input" placeholder="TU NOMBRE" maxlength="12">
        <button onclick="showInstructions()">SIGUIENTE</button>
    </div>

    <!-- PAUSA -->
    <div id="pause-modal" class="modal" style="display:none; z-index: 300;">
        <h2 style="color:#00ffff;">PAUSA TÁCTICA</h2>
        <button onclick="togglePause()">REANUDAR</button>
        <button style="background:#ff00ff; color:#fff;" onclick="window.location.reload()">MENÚ PRINCIPAL</button>
    </div>

    <div id="instruction-screen" class="modal" style="display:none;">
        <h2 style="color:#ffff00;">¡HOLA!</h2>
        <p style="font-size: 12px; line-height: 1.4; text-align: left;">
            🎯 <b>RECONOCIMIENTO:</b> Al iniciar tendrás 3 seg. para ver el mapa.<br><br>
            🚨 <b>CENTINELA:</b> Te perseguirá después de la cuenta atrás.<br><br>
            ⏸ <b>PAUSA:</b> Usa el botón de abajo si necesitas descansar.
        </p>
        <button onclick="startGame()">¡A JUGAR!</button>
    </div>

    <div id="learning-modal" class="modal" style="display:none; z-index: 150;">
        <h2 id="learn-title" style="color:#ffff00;">¡ÉXITO!</h2>
        <div id="streak-msg" style="color:#ff00ff; font-weight:bold; margin-bottom:10px;"></div>
        <p id="learn-text" style="font-size: 14px; margin: 10px 0;"></p>
        <hr style="width:100%; border:0; border-top:1px solid #00ffff; margin:15px 0;">
        <p id="quiz-question" style="font-weight:bold; margin-bottom: 15px; font-size: 14px;"></p>
        <div id="quiz-options" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    </div>

    <div class="ui-overlay">
        <div id="ui-lives" style="color:#ff00ff; font-weight:bold;">❤️❤️❤️</div>
        <div id="ui-streak" style="color:#ffff00; font-weight:bold;">🔥 0</div>
    </div>
</div>

<script>
const AudioFX = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    lastErrorTime: 0,
    play(freq, type, duration, vol = 0.03) {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    collect() { this.play(880, 'sine', 0.1); },
    hit() { this.play(100, 'sine', 0.3, 0.08); },
    win() { this.play(523, 'sine', 0.1); setTimeout(()=>this.play(659,'sine',0.1),100); setTimeout(()=>this.play(783,'sine',0.3),200); },
    correct() { this.play(1000, 'sine', 0.2); },
    wrong() { const now = Date.now(); if(now-this.lastErrorTime > 2000){ this.play(200,'sine',0.1,0.03); this.lastErrorTime=now; } }
};

const SUPABASE_URL = "https://cqsveyvxozegcxbidvqh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxc3ZleXZ4b3plZ2N4YmlkdnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mzg4MTcsImV4cCI6MjA5NDExNDgxN30.-wxhr3p_Sltxe37FUZzsO7h6xv0e5WOC_n6Oi-384hU";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const config = {
    type: Phaser.AUTO, width: 450, height: 800, parent: 'game-container', backgroundColor: '#050510', pixelArt: true,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, enemy, letters, mazeWalls, countdownText;
let allLevels = [], currentLevelIndex = 0, currentLevel = null;
let collectedWord = "", uiTextWord, uiTextHint, uiTextLevel, lives = 3, streak = 0;
let dpad = { up: false, down: false, left: false, right: false };
let isPaused = false, isScanning = true;

function preload() {
    const graphics = this.make.graphics();
    graphics.fillStyle(0x00ffff); graphics.fillRect(2, 2, 20, 20);
    graphics.generateTexture('robot', 24, 24);
    graphics.clear(); graphics.fillStyle(0xff0000); graphics.fillCircle(12, 12, 10);
    graphics.generateTexture('enemy', 24, 24);
    graphics.clear(); graphics.fillStyle(0x1a1a2e); graphics.fillRect(0,0,40,40);
    graphics.lineStyle(2, 0x00ffff, 0.3); graphics.strokeRect(2,2,36,36);
    graphics.generateTexture('wall', 40, 40);
}

async function create() {
    const scene = this;
    fetchRanking();
    try {
        const { data, error } = await supabaseClient.from('niveles').select('*').order('id', { ascending: true });
        if (error) throw error;
        allLevels = data.map(d => d.config);
    } catch (e) { console.error("Error DB:", e); }
    if (allLevels.length === 0) allLevels = [{ word: "SAID", hint: "REGLA: +1", shift: 1, maze: [[1,1,1],[1,0,1],[1,1,1]] }];
    const savedLevel = localStorage.getItem('cq_current_level');
    if (savedLevel && savedLevel < allLevels.length) currentLevelIndex = parseInt(savedLevel);
    const savedStreak = localStorage.getItem('cq_streak');
    if (savedStreak) streak = parseInt(savedStreak);
    loadLevel(scene);
    scene.physics.pause();
    const savedName = localStorage.getItem('cq_username');
    if (savedName) document.getElementById('username-input').value = savedName;
}

function togglePause() {
    isPaused = !isPaused;
    const modal = document.getElementById('pause-modal');
    if (isPaused) {
        modal.style.display = 'flex';
        game.scene.scenes[0].physics.pause();
    } else {
        modal.style.display = 'none';
        if (!isScanning) game.scene.scenes[0].physics.resume();
    }
}

async function fetchRanking() {
    const { data } = await supabaseClient.from('rankings').select('username, score').order('score', { ascending: false }).limit(5);
    if (data) {
        const list = document.getElementById('rank-list');
        list.innerHTML = data.map((r, i) => `<div class="rank-item"><span>${i+1}. ${r.username}</span> <span>NIVEL ${r.score/100}</span></div>`).join('');
    }
}

function showInstructions() {
    const name = document.getElementById('username-input').value.trim();
    if (name.length < 2) return alert("¡Dime tu nombre!");
    localStorage.setItem('cq_username', name);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('instruction-screen').style.display = 'flex';
}

function startGame() {
    document.getElementById('instruction-screen').style.display = 'none';
    startScanMode();
}

function startScanMode() {
    isScanning = true;
    game.scene.scenes[0].physics.pause();
    let count = 3;
    countdownText.setText(`ESCANEANDO... ${count}`).setVisible(true);
    const timer = setInterval(() => {
        count--;
        if (count > 0) {
            countdownText.setText(`ESCANEANDO... ${count}`);
        } else {
            clearInterval(timer);
            countdownText.setText("¡EXPLORA!").setColor('#00ff00');
            setTimeout(() => {
                countdownText.setVisible(false);
                isScanning = false;
                if (!isPaused) game.scene.scenes[0].physics.resume();
            }, 1000);
        }
    }, 1000);
}

function loadLevel(scene) {
    currentLevel = allLevels[currentLevelIndex];
    collectedWord = ""; lives = 3; updateLivesUI();
    document.getElementById('ui-streak').innerText = `🔥 ${streak}`;
    if (mazeWalls) mazeWalls.clear(true, true);
    if (letters) letters.clear(true, true);
    mazeWalls = scene.physics.add.staticGroup();
    currentLevel.maze.forEach((row, rIdx) => {
        row.forEach((cell, cIdx) => {
            if (cell === 1) mazeWalls.create(cIdx * 40 + 20, rIdx * 40 + 160, 'wall').setDepth(1);
        });
    });
    if (!player) {
        player = scene.physics.add.sprite(60, 200, 'robot').setDepth(2);
        enemy = scene.physics.add.sprite(380, 200, 'enemy').setDepth(2);
        player.setCollideWorldBounds(true); enemy.setCollideWorldBounds(true);
        player.setBodySize(18, 18);
        scene.physics.add.collider(player, mazeWalls); scene.physics.add.collider(enemy, mazeWalls);
        scene.physics.add.overlap(player, enemy, handleEnemyHit, null, scene);
    } else {
        player.setPosition(60, 200); enemy.setPosition(380, 200);
        scene.physics.add.collider(player, mazeWalls); scene.physics.add.collider(enemy, mazeWalls);
    }
    letters = scene.physics.add.group();
    setupLetters(scene);
    scene.physics.add.overlap(player, letters, collectLetter, null, scene);
    if (!uiTextWord) {
        uiTextWord = scene.add.text(225, 45, "", { fontSize: '24px', color: '#ffffff', fontWeight: 'bold' }).setOrigin(0.5).setDepth(10);
        uiTextHint = scene.add.text(225, 80, "", { fontSize: '13px', color: '#ff00ff' }).setOrigin(0.5).setDepth(10);
        uiTextLevel = scene.add.text(20, 110, "", { fontSize: '12px', color: '#00ffff' }).setDepth(10);
        countdownText = scene.add.text(225, 400, "", { fontSize: '32px', color: '#ffff00', fontWeight: 'bold', backgroundColor: '#000000aa' }).setOrigin(0.5).setDepth(500);
    }
    updateWordDisplay();
    uiTextHint.setText("REGLA: SALTA 1 LETRA (A->B)");
    uiTextLevel.setText(`NIVEL: ${currentLevelIndex + 1}`);
    updateTask();
    if (!scene.cursors) { createDPad(scene); scene.cursors = scene.input.keyboard.createCursorKeys(); }
}

function updateWordDisplay() {
    let display = collectedWord.split('').join(' ') + " ";
    display += "_ ".repeat(currentLevel.word.length - collectedWord.length);
    uiTextWord.setText(display.trim());
}

function handleEnemyHit() {
    AudioFX.hit(); lives--; streak = 0; localStorage.setItem('cq_streak', 0);
    updateLivesUI(); document.getElementById('ui-streak').innerText = `🔥 0`;
    this.cameras.main.shake(300, 0.02); player.setPosition(60, 200); enemy.setPosition(380, 200);
    if (lives <= 0) { alert("¡Misión Fallida!"); window.location.reload(); }
}

function updateLivesUI() { document.getElementById('ui-lives').innerText = "❤️".repeat(lives); }

function update() {
    if (!player || !player.active || isPaused || isScanning) return;
    player.setVelocity(0); const speed = 180;
    if (this.cursors.left.isDown || dpad.left) player.setVelocityX(-speed);
    else if (this.cursors.right.isDown || dpad.right) player.setVelocityX(speed);
    if (this.cursors.up.isDown || dpad.up) player.setVelocityY(-speed);
    else if (this.cursors.down.isDown || dpad.down) player.setVelocityY(speed);
    if (enemy.active) this.physics.moveToObject(enemy, player, 80);
}

function setupLetters(scene) {
    const word = currentLevel.word; const shift = currentLevel.shift;
    let freeSpaces = [];
    currentLevel.maze.forEach((row, rIdx) => {
        row.forEach((cell, cIdx) => {
            if (cell === 0) freeSpaces.push({x: cIdx * 40 + 20, y: rIdx * 40 + 160});
        });
    });
    word.split('').forEach((char) => {
        const ciphered = String.fromCharCode(((char.charCodeAt(0) - 65 + shift) % 26) + 65);
        let pos = Phaser.Utils.Array.RemoveRandomElement(freeSpaces) || {x:225, y:400};
        let l = scene.add.text(pos.x, pos.y, ciphered, { fontSize: '22px', color: '#ffff00', fontWeight: 'bold' }).setOrigin(0.5).setDepth(3);
        scene.physics.add.existing(l); l.setData('val', char); letters.add(l);
    });
}

function collectLetter(p, l) {
    const val = l.getData('val');
    if (val === currentLevel.word[collectedWord.length]) {
        AudioFX.collect(); collectedWord += val; l.destroy(); updateWordDisplay();
        if (collectedWord === currentLevel.word) { AudioFX.win(); showLearningPhase(); }
        else updateTask();
    } else { AudioFX.wrong(); this.cameras.main.shake(100, 0.005); }
}

function showLearningPhase() {
    game.scene.scenes[0].physics.pause(); streak++;
    localStorage.setItem('cq_streak', streak);
    document.getElementById('learning-modal').style.display = 'flex';
    document.getElementById('streak-msg').innerText = `¡RACHA DE ${streak} NIVELES! 🔥`;
    const info = currentLevel.learning;
    document.getElementById('learn-text').innerText = info.text;
    document.getElementById('quiz-question').innerText = info.question;
    const optionsDiv = document.getElementById('quiz-options');
    optionsDiv.innerHTML = "";
    info.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-option'; btn.innerText = opt;
        btn.onclick = () => checkQuiz(idx, info.correct); optionsDiv.appendChild(btn);
    });
}

function checkQuiz(selected, correct) {
    if (selected === correct) {
        AudioFX.correct(); document.getElementById('learning-modal').style.display = 'none';
        currentLevelIndex++; localStorage.setItem('cq_current_level', currentLevelIndex);
        saveScore();
        if (currentLevelIndex < allLevels.length) { 
            loadLevel(game.scene.scenes[0]); 
            startScanMode();
        } else { alert("¡Felicidades!"); window.location.reload(); }
    } else { AudioFX.wrong(); alert("¡Analiza de nuevo!"); }
}

async function saveScore() {
    const user = localStorage.getItem('cq_username') || "Explorador";
    await supabaseClient.from('rankings').upsert([{ username: user, score: currentLevelIndex * 100 }], { onConflict: 'username' });
}

function updateTask() {
    const nextChar = currentLevel.word[collectedWord.length];
    const shift = currentLevel.shift;
    const cipheredNext = String.fromCharCode(((nextChar.charCodeAt(0) - 65 + shift) % 26) + 65);
    document.getElementById('next-task').innerText = `BUSCA: ${cipheredNext}`;
}

function createDPad(scene) {
    const x = 320, y = 650;
    const btn = (bx, by, dir, symbol) => {
        let b = scene.add.circle(bx, by, 40, 0x00ffff, 0.1).setInteractive().setDepth(100);
        b.setStrokeStyle(2, 0x00ffff);
        scene.add.text(bx, by, symbol, { fontSize: '28px', color: '#00ffff' }).setOrigin(0.5).setDepth(101);
        const reset = () => { dpad[dir] = false; b.setAlpha(1); };
        b.on('pointerdown', () => { dpad[dir] = true; b.setAlpha(0.5); });
        b.on('pointerup', reset); b.on('pointerout', reset); b.on('pointerupoutside', reset);
    };
    btn(x, y-60, 'up', '▲'); btn(x, y+60, 'down', '▼');
    btn(x-60, y, 'left', '◀'); btn(x+70, y, 'right', '▶');
}
</script>
</body>
</html>
